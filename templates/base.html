<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ seo.description if seo and seo.description else 'Konvexity is a premium leadership, organizational transformation, and human performance consulting company helping founders, executives, and institutions achieve sustainable growth through clarity.' }}">
    <meta name="theme-color" content="#0A1428">
    <meta name="robots" content="index, follow">

    <title>{{ seo.title if seo and seo.title else 'Konvexity — Where Clarity Meets Growth' }}</title>

    <link rel="canonical" href="{{ seo.canonical_url if seo and seo.canonical_url else request.url }}">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/brand/favicon.svg') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'deep': '#0A1428',
                        'deeper': '#060E1E',
                        'teal': '#00D4C5',
                        'cyan': '#67F0E0',
                        'gold': '#D4AF37',
                        'neutral': {
                            200: '#F5F7FA',
                            300: '#E2E6ED',
                            400: '#8B95A8',
                            500: '#5A6577',
                            600: '#3A4555',
                        },
                    },
                    fontFamily: {
                        'sans': ['Inter', '-apple-system', 'sans-serif'],
                        'display': ['Inter', 'sans-serif'],
                        'serif': ['Playfair Display', 'Georgia', 'serif'],
                    },
                },
            },
        };
    </script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">

    <script>
        (function() {
            var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            if (prefersReducedMotion) {
                document.documentElement.classList.add('reduced-motion');
            }
        })();
    </script>
</head>
<body class="font-sans antialiased text-neutral-200 bg-deeper min-h-screen flex flex-col">

    <a href="#main-content" class="skip-link">Skip to main content</a>

    {% include 'components/navigation.html' %}

    <main id="main-content" class="flex-1">
        {% block content %}{% endblock %}
    </main>

    {% include 'components/footer.html' %}

    <div id="back-to-top" class="fixed bottom-8 right-8 z-50 opacity-0 invisible translate-y-4 transition-all duration-500 pointer-events-none">
        <button aria-label="Back to top" class="w-12 h-12 rounded-full bg-teal text-deeper flex items-center justify-center shadow-lg hover:shadow-[0_0_30px_rgba(0,212,197,0.3)] transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-teal focus:ring-offset-2 focus:ring-offset-deeper">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg>
        </button>
    </div>

    <script src="{{ url_for('static', filename='js/animations.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    {% block scripts %}{% endblock %}
</body>
</html>
