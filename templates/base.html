<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Konvexity — Where Clarity Meets Growth{% endblock %}</title>
  <meta name="description" content="{% block meta_desc %}Konvexity is a premium leadership and organizational growth firm helping institutions, founders, and executives achieve clarity, drive growth, and sustain excellence.{% endblock %}">
  <meta name="theme-color" content="#030711">

  <!-- Performance: preconnect before requesting font files -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M4 20 C 4 20, 6 6, 20 4' fill='none' stroke='%2314b8a6' stroke-width='2.6' stroke-linecap='round'/%3E%3C/svg%3E">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">

  {% block extra_head %}{% endblock %}
</head>
<body>

  {% include 'components/navigation.html' %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% include 'components/footer.html' %}

  <script src="{{ url_for('static', filename='js/animations.js') }}" defer></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
