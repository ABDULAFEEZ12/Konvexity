<!-- templates/errors/404.html -->
{% extends "base.html" %}
{% block content %}
<section class="error-page">
    <div class="container">
        <div class="error-code reveal">404</div>
        <h2 class="reveal" data-delay="100">Page Not Found</h2>
        <p class="reveal" data-delay="200">The page you are looking for does not exist or has been moved.</p>
        <div class="cta-buttons reveal" data-delay="300">
            <a href="{{ url_for('public.home') }}" class="btn btn-primary">Return Home <span class="btn-arrow">&rarr;</span></a>
            <a href="{{ url_for('public.contact') }}" class="btn btn-secondary">Contact Us</a>
        </div>
    </div>
</section>
{% endblock %}
