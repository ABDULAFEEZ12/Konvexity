<!-- contact.html -->
{% extends "base.html" %}
{% block title %}Contact — Konvexity{% endblock %}
{% block extra_head %}
<style>
  .contact-form { max-width:600px; margin:6rem auto; background:var(--glass-bg); padding:3rem; border-radius:2rem; }
  input, textarea { width:100%; background:transparent; border:1px solid var(--glass-border); padding:1rem; margin-bottom:1.5rem; color:var(--smoke); border-radius:0.8rem; }
</style>
{% endblock %}
{% block content %}
<div class="container contact-form">
  <h1>Begin the <span class="accent-text">conversation</span></h1>
  <form><input placeholder="Name"><input placeholder="Organization"><input placeholder="Email"><textarea rows="4" placeholder="What clarity challenge can we solve?"></textarea><button class="btn-filled" type="button">Send Inquiry</button></form>
</div>
{% endblock %}
