<!-- faculty.html -->
{% extends "base.html" %}
{% block title %}Faculty — Konvexity{% endblock %}
{% block extra_head %}
<style>
  .faculty-grid { display:grid; grid-template-columns: repeat(3,1fr); gap:2.5rem; margin:4rem 0; }
  .faculty-card { text-align: center; }
  .faculty-avatar { width:100px; height:100px; background:var(--glass-bg); border-radius:50%; margin:0 auto 1rem; border:2px solid var(--accent); }
</style>
{% endblock %}
{% block content %}
<div class="container" style="padding-top:9rem;">
  <h1>World-Class <span class="accent-text">Faculty</span></h1>
  <div class="faculty-grid">
    <div class="faculty-card"><div class="faculty-avatar"></div><h3>Dr. Amara Diop</h3><p>Behavioral Architecture</p></div>
    <div class="faculty-card"><div class="faculty-avatar"></div><h3>Prof. Kofi Mensah</h3><p>Systems & Governance</p></div>
    <div class="faculty-card"><div class="faculty-avatar"></div><h3>Nia Wanjiku</h3><p>Executive Leadership</p></div>
  </div>
</div>
{% endblock %}
